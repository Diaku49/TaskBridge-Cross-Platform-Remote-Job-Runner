<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TaskBridge Dashboard</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true">
      <symbol id="icon-activity" viewBox="0 0 24 24">
        <path d="M3 12h4l3-8 4 16 3-8h4"></path>
      </symbol>
      <symbol id="icon-refresh" viewBox="0 0 24 24">
        <path d="M20 6v6h-6"></path>
        <path d="M4 18v-6h6"></path>
        <path d="M18.5 9A7 7 0 0 0 6.2 6.2L4 8.4"></path>
        <path d="M5.5 15A7 7 0 0 0 17.8 17.8L20 15.6"></path>
      </symbol>
      <symbol id="icon-search" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7"></circle>
        <path d="m16 16 4 4"></path>
      </symbol>
      <symbol id="icon-briefcase" viewBox="0 0 24 24">
        <path d="M10 6V5a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2v1"></path>
        <rect x="3" y="6" width="18" height="14" rx="2"></rect>
        <path d="M3 12h18"></path>
      </symbol>
      <symbol id="icon-cpu" viewBox="0 0 24 24">
        <rect x="7" y="7" width="10" height="10" rx="2"></rect>
        <path d="M9 1v4M15 1v4M9 19v4M15 19v4M1 9h4M1 15h4M19 9h4M19 15h4"></path>
      </symbol>
      <symbol id="icon-database" viewBox="0 0 24 24">
        <ellipse cx="12" cy="5" rx="8" ry="3"></ellipse>
        <path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5"></path>
        <path d="M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"></path>
      </symbol>
      <symbol id="icon-chevron" viewBox="0 0 24 24">
        <path d="m9 18 6-6-6-6"></path>
      </symbol>
    </svg>

    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark"><svg><use href="#icon-activity"></use></svg></span>
          <div>
            <h1>TaskBridge</h1>
            <p>Remote job runner dashboard</p>
          </div>
        </div>

        <div class="toolbar">
          <label class="api-field">
            <span>API URL</span>
            <input id="apiBaseInput" type="text" spellcheck="false" value="http://localhost:8080" title="Backend API base URL.">
          </label>
          <span id="healthBadge" class="health-badge is-muted">
            <span class="dot"></span>
            Checking
          </span>
          <button id="refreshButton" class="icon-button" type="button" title="Refresh data" aria-label="Refresh data">
            <svg><use href="#icon-refresh"></use></svg>
          </button>
        </div>
      </header>

      <section class="summary-grid" aria-label="Summary">
        <article class="metric">
          <div class="metric-icon"><svg><use href="#icon-briefcase"></use></svg></div>
          <span class="metric-label">Jobs</span>
          <strong id="metricJobs">0</strong>
        </article>
        <article class="metric">
          <div class="metric-icon"><svg><use href="#icon-activity"></use></svg></div>
          <span class="metric-label">Running</span>
          <strong id="metricRunning">0</strong>
        </article>
        <article class="metric">
          <div class="metric-icon"><svg><use href="#icon-database"></use></svg></div>
          <span class="metric-label">Pending</span>
          <strong id="metricPending">0</strong>
        </article>
        <article class="metric">
          <div class="metric-icon"><svg><use href="#icon-cpu"></use></svg></div>
          <span class="metric-label">Online Agents</span>
          <strong id="metricAgents">0</strong>
        </article>
      </section>

      <main class="workspace">
        <section class="panel list-panel">
          <div class="panel-header">
            <div class="tabs" role="tablist" aria-label="Dashboard views">
              <button id="jobsTab" class="tab is-active" type="button" role="tab" aria-selected="true">Jobs</button>
              <button id="agentsTab" class="tab" type="button" role="tab" aria-selected="false">Agents</button>
            </div>
            <div class="search-field">
              <svg><use href="#icon-search"></use></svg>
              <input id="filterInput" type="search" placeholder="Filter">
            </div>
          </div>

          <div id="jobsView" class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Status</th>
                  <th>Type</th>
                  <th>Agent</th>
                  <th>Attempts</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="jobsTable"></tbody>
            </table>
          </div>

          <div id="agentsView" class="table-wrap is-hidden">
            <table>
              <thead>
                <tr>
                  <th>Agent</th>
                  <th>Status</th>
                  <th>Host</th>
                  <th>Platform</th>
                  <th>Capabilities</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="agentsTable"></tbody>
            </table>
          </div>
        </section>

        <aside class="side-stack">
          <section class="panel create-panel">
            <div class="panel-header">
              <div>
                <span class="eyebrow">Create</span>
                <h2>New job</h2>
              </div>
            </div>

            <form id="createJobForm" class="create-form">
              <label>
                <span>Name</span>
                <input id="createJobName" type="text" required placeholder="wait-demo">
              </label>

              <div class="form-grid">
                <label>
                  <span>Type</span>
                  <select id="createJobType">
                    <option value="wait">wait</option>
                    <option value="http_check">http_check</option>
                    <option value="tcp_check">tcp_check</option>
                    <option value="file_exists">file_exists</option>
                    <option value="checksum">checksum</option>
                    <option value="write_file">write_file</option>
                  </select>
                </label>

                <label>
                  <span>Timeout</span>
                  <input id="createJobTimeout" type="number" min="0" step="1" value="10">
                </label>

                <label>
                  <span>Retries</span>
                  <input id="createJobRetries" type="number" min="0" step="1" value="0">
                </label>
              </div>

              <label>
                <span>Payload</span>
                <textarea id="createJobPayload" rows="6" spellcheck="false"></textarea>
              </label>

              <button id="createJobButton" class="primary-button" type="submit">
                Create job
              </button>
            </form>
          </section>

          <section class="panel detail-panel">
            <div class="panel-header stacked">
              <div>
                <span class="eyebrow">Lookup</span>
                <h2>Job detail</h2>
              </div>
              <form id="jobLookupForm" class="lookup-form">
                <input id="jobLookupInput" type="text" placeholder="Job ID" spellcheck="false">
                <button class="icon-button" type="submit" title="Find job" aria-label="Find job">
                  <svg><use href="#icon-search"></use></svg>
                </button>
              </form>
            </div>

            <div id="detailBody" class="detail-body empty-state">
              <svg><use href="#icon-database"></use></svg>
              <p>No selection</p>
            </div>
          </section>
        </aside>
      </main>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </div>

    <script src="./config.js"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
